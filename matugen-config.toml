[config]

[templates.dykwabigtk3]
input_path = './templates/gtk-colors.css'
output_path = '~/.config/gtk-3.0/buck-colors.css'

[templates.dykwabigtk4]
input_path = './templates/gtk-colors.css'
output_path = '~/.config/gtk-4.0/buck-colors.css'

[templates.dykwabiqt5ct]
input_path = './templates/qtct-colors.conf'
output_path = '~/.config/qt5ct/colors/matugen.conf'

[templates.dykwabiqt6ct]
input_path = './templates/qtct-colors.conf'
output_path = '~/.config/qt6ct/colors/matugen.conf'

[templates.dykwabikcolorscheme]
input_path = './templates/matugen-kcolorscheme.colors'
