[templates.dykwabiniri]
input_path = './templates/niri-colors.kdl'
output_path = '~/.config/niri/buckshell-colors.kdl'

[templates.dykwabighostty]
input_path = './templates/ghostty-colors.conf'
output_path = '~/.config/ghostty/config-buckcolors'